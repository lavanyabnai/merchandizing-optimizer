# =============================================================================
# Grafana Dashboard Provisioning
# =============================================================================

apiVersion: 1

providers:
  - name: 'Assortment Optimizer Dashboards'
    orgId: 1
    folder: 'Assortment Optimizer'
    folderUid: 'assortment-optimizer'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
