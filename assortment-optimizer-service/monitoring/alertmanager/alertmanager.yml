# =============================================================================
# Alertmanager Configuration
# =============================================================================
# Alert routing and notification configuration

global:
  # How long to wait before sending a notification again if it's still firing
  resolve_timeout: 5m

  # SMTP configuration for email notifications
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@example.com'
  # smtp_auth_username: 'alerts@example.com'
  # smtp_auth_password: '$SMTP_PASSWORD'

  # Slack configuration
  # slack_api_url: '$SLACK_WEBHOOK_URL'

  # PagerDuty configuration
  # pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Route tree configuration
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'instance']

  # How long to wait to buffer alerts before sending
  group_wait: 30s

  # How long to wait before sending notification about new alerts added to group
  group_interval: 5m

  # How long to wait before re-sending notification
  repeat_interval: 4h

  # Child routes for specific alert types
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts - standard notification
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 4h

    # Database alerts - send to DBA team
    - match_re:
        alertname: ^(DB.*)$
      receiver: 'database-receiver'
      group_wait: 30s

# Inhibition rules - suppress notifications for related alerts
inhibit_rules:
  # If service is down, suppress all other alerts for that instance
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.*'
    equal: ['instance']

  # If there's a critical alert, suppress warning alerts for same alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# Receivers configuration
receivers:
  # Default receiver (console output for development)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # Critical alerts receiver
  - name: 'critical-receiver'
    # Uncomment and configure for production:
    # pagerduty_configs:
    #   - service_key: '$PAGERDUTY_SERVICE_KEY'
    #     severity: critical
    # slack_configs:
    #   - channel: '#alerts-critical'
    #     title: '[CRITICAL] {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/webhook/critical'
        send_resolved: true

  # Warning alerts receiver
  - name: 'warning-receiver'
    # slack_configs:
    #   - channel: '#alerts-warning'
    #     title: '[WARNING] {{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
    #     send_resolved: true
    webhook_configs:
      - url: 'http://localhost:5001/webhook/warning'
        send_resolved: true

  # Database alerts receiver
  - name: 'database-receiver'
    # email_configs:
    #   - to: 'dba-team@example.com'
    #     headers:
    #       Subject: '[DB Alert] {{ .GroupLabels.alertname }}'
    webhook_configs:
      - url: 'http://localhost:5001/webhook/database'
        send_resolved: true

# Templates for notification formatting
templates:
  - '/etc/alertmanager/templates/*.tmpl'
